body:
  text: 抱朴子養生論抱朴子曰一人之身一囯之象也胷腹之設猶宮室也支體之位猶郊境也骨節之分猶百官也腠理之間猶四衢也神猶君也血猶臣也炁猶民也故至人能治其身亦如明主能治其國夫愛其民所以安其國愛其氣所以全其身民弊國亡氣衰身謝是以至人上士乃施藥於未病之前不追修於既敗之後故知生難保而易散氣難清而易濁若能審機權可以制嗜愁保金性命且夫善飬生者先除六害然後可以延駐於百年何者是耶一曰薄名利二曰禁聲色三曰㢘貨財四曰損滋味五曰除佞妄六曰去沮嫉六者不除修養之道徒設爾蓋綠未見其益雖心希妙道口念真經咀嚼英華呼吸景象不能補其短促誠縁捨其本而忘其末深可誡哉所以保和全真者乃少思少念少笑少言少喜少怒少樂少愁少好少惡少事少機夫多思則神散多念則心勞多笑則藏腑上翻多言則氣海虚脱多喜則牓胱納客風多怒則腠理奔血多樂則心神邪蕩多愁則頭鬢憔枯多好則志氣傾溢多亞則精爽奔騰多事則筋脉乾急多機則智慮沉迷斯乃伐人之生甚於斤芹損人之命猛於犲狼無久坐無久行無久視無久聽不飢勿强食不渇勿强飮不飢强食則脾勞不渇强飮則胃脹體欲常勞食欲常少勞勿過極少勿至飢冬朝勿空心夏夜勿飽食早起不在雞鳴前晚起不在日出後心内澄則真神守其位氣内定則邪物去其身行欺詐則神悲行爭競則神沮輕侮於人當減筭殺害於物必傷年行一善則魂神樂構一惡則魄神歡魄神樂死魂神好生常以寛泰自居恬惔自守則身形安靜災害不干生錄必書其名死籍必削其咎飬生之理盡於此矣至於鍊還丹以補腦化金液以留神斯乃上真乏妙道蓋非食縠㗖血煮越分而修之萬人之中得者殊少深可誠焉老君曰存吾此道上士全修延夀命中士半修無災病下士時修免夭橫愚者失道擯其性其斯之謂歟抱朴子養生論終
